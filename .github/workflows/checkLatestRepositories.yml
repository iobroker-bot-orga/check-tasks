name: Check LATEST repositories

on:
  repository_dispatch:
    types: [check-latest-restart]

  workflow_dispatch:
    inputs:
      filter:
        type: string
        required: false
        description: 'Filter repositories by owner/name pattern (optional). Supports wildcards: owner/*, */name, owner*/*, */*pattern*. Case-insensitive.'

      flags:
        type: string
        required: false

      from:
        type: string
        required: false
        description: 'Resume processing from this adapter name (optional)'

      delay:
        type: string
        required: false
        default: '30'
        description: 'Delay in seconds between processing each repository (default: 30)'

  schedule:
    # * is a special character in YAML, so you have to quote this string
    # every thursday at 19:30
    - cron:  '30 19 * * 4'

jobs:
  check-latest-repository:
    name: check latest repository
    if: |
      github.repository == 'iobroker-bot-orga/check-tasks'
      
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm i
      - name: Trim workflow parameters
        id: trim_params
        run: |
          # Trim all string input parameters to remove leading/trailing whitespace
          # Handle both workflow_dispatch (inputs) and repository_dispatch (client_payload)
          FROM=$(echo "${{ github.event.inputs.from }}${{ github.event.client_payload.from }}" | xargs)
          FILTER=$(echo "${{ github.event.inputs.filter }}${{ github.event.client_payload.filter }}" | xargs)
          FLAGS=$(echo "${{ github.event.inputs.flags }}${{ github.event.client_payload.flags }}" | xargs)
          DELAY=$(echo "${{ github.event.inputs.delay }}${{ github.event.client_payload.delay }}" | xargs)
          # Set default delay if empty
          if [ -z "$DELAY" ]; then
            DELAY="30"
          fi
          # Only pass --filter flag when filter is non-empty
          if [ -n "$FILTER" ]; then
            FILTER_ARG="--filter=$FILTER"
          else
            FILTER_ARG=""
          fi
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "filter_arg=$FILTER_ARG" >> $GITHUB_OUTPUT
          echo "flags=$FLAGS" >> $GITHUB_OUTPUT
          echo "delay=$DELAY" >> $GITHUB_OUTPUT
      - run: node checks/checkLatestRepositories/checkLatestRepositories.js --from="${{ steps.trim_params.outputs.from }}" --delay="${{ steps.trim_params.outputs.delay }}" ${{ steps.trim_params.outputs.filter_arg }} ${{ steps.trim_params.outputs.flags }}
        env:
          IOBBOT_GITHUB_TOKEN: ${{ secrets.IOBBOT_GITHUB_TOKEN }}
